<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="L">
  <defs>
    <filter id="tile-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <!-- Card face: matches .tile__face (portrait tile proportion in square canvas) -->
  <rect x="6.5" y="2" width="19" height="28" rx="4.75" ry="4.75"
    fill="#f5f5f7"
    stroke="rgba(0,0,0,0.07)"
    stroke-width="0.5"
    filter="url(#tile-shadow)"/>
  <text x="16" y="22.5"
    text-anchor="middle"
    font-family="ui-rounded, system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="17"
    font-weight="900"
    letter-spacing="-0.03em"
    fill="#1c1c1e">L</text>
</svg>
