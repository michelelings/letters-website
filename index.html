<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!-- OG/Twitter image URL must be absolute and reachable (same host as production avoids crawler issues). -->
  <link rel="canonical" href="https://www.letters.game/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.letters.game/">
  <meta property="og:title" content="Download Letters on the App Store">
  <meta property="og:description" content="Play Letters — the word game from Ocho. Available on the App Store.">
  <meta property="og:image" content="https://www.letters.game/og-image.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="900">
  <meta property="og:image:alt" content="Download Letters on the App Store">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Download Letters on the App Store">
  <meta name="twitter:description" content="Play Letters — the word game from Ocho. Available on the App Store.">
  <meta name="twitter:image" content="https://www.letters.game/og-image.png">
  <title>Download Letters on the App Store</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CYNDT2QSQX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-CYNDT2QSQX');
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="main">
    <div class="main__stage">
      <div class="word" id="word" aria-live="polite"></div>
    </div>
    <p class="beta-cta">
      <a class="beta-cta__btn" href="https://testflight.apple.com/join/3jNtcz3K" target="_blank" rel="noopener noreferrer">Download Beta</a>
    </p>
  </main>
  <footer class="site-footer">
    <p>Letters is made by <a href="https://www.ocho.so" target="_blank" rel="noopener noreferrer">Ocho</a></p>
  </footer>
  <script src="words.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      function analyticsEvent(name, params) {
        if (typeof gtag === 'function') {
          gtag('event', name, params);
        }
      }

      const betaLink = document.querySelector('.beta-cta a');
      betaLink?.addEventListener('click', () => {
        analyticsEvent('download_beta_click', { link_url: betaLink.href });
      });

      const ochoLink = document.querySelector('.site-footer a');
      ochoLink?.addEventListener('click', () => {
        analyticsEvent('ocho_link_click', { link_url: ochoLink.href });
      });
    });
  </script>
</body>
</html>
