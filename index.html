<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!-- OG/Twitter image URL must be absolute and reachable (same host as production avoids crawler issues). -->
  <link rel="canonical" href="https://www.letters.game/">
  <link rel="alternate" hreflang="en" href="https://www.letters.game/">
  <link rel="alternate" hreflang="es" href="https://www.letters.game/es/">
  <link rel="alternate" hreflang="x-default" href="https://www.letters.game/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.letters.game/">
  <meta property="og:locale" content="en_US">
  <meta property="og:locale:alternate" content="es_ES">
  <meta property="og:title" content="Download Letters on the App Store">
  <meta property="og:description" content="Play Letters, the word game from Ocho. Available on the App Store.">
  <meta property="og:image" content="https://www.letters.game/og-image.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="900">
  <meta property="og:image:alt" content="Download Letters on the App Store">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Download Letters on the App Store">
  <meta name="twitter:description" content="Play Letters, the word game from Ocho. Available on the App Store.">
  <meta name="twitter:image" content="https://www.letters.game/og-image.png">
  <title>Download Letters on the App Store</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CYNDT2QSQX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ letters_locale: 'en' });
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-CYNDT2QSQX');
  </script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="main main--interactive">
    <div class="main__stage">
      <section class="card-demo" id="card-demo" aria-label="Letters prototype. Type letter keys to fill slots. Backspace removes the last letter.">
        <h1 class="card-demo__clue" id="card-clue">Learn</h1>

        <div class="card-demo__slots" id="card-slots" aria-label="Answer slots"></div>
        <div class="card-demo__bank" id="card-bank" aria-label="Letter bank"></div>

        <p class="card-demo__feedback" id="card-feedback" aria-live="polite"></p>
        <button class="card-demo__reset" id="card-reset" type="button">Reset</button>
      </section>
    </div>
    <p class="beta-cta">
      <a class="beta-cta__btn" href="https://testflight.apple.com/join/3jNtcz3K" target="_blank" rel="noopener noreferrer">Download Letters</a>
    </p>
  </main>
  <footer class="site-footer">
    <nav class="site-footer__extras" aria-label="Site">
      <a href="/guides/best-ways-to-learn-vocabulary/">Learn vocabulary</a>
      <span class="lang-switch__sep" aria-hidden="true">·</span>
      <a href="/guides/">All guides</a>
    </nav>
    <nav class="lang-switch" aria-label="Choose language">
      <a href="/" hreflang="en" aria-current="true">English</a>
      <span class="lang-switch__sep" aria-hidden="true">·</span>
      <a href="/es/" hreflang="es">Español</a>
    </nav>
    <p>Letters is made by <a href="https://www.ocho.so" target="_blank" rel="noopener noreferrer">Ocho</a></p>
  </footer>
  <script src="/words.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      function analyticsEvent(name, params) {
        if (typeof gtag === 'function') {
          gtag('event', name, params);
        }
      }

      const ochoLink = document.querySelector('.site-footer p a');
      ochoLink?.addEventListener('click', () => {
        analyticsEvent('ocho_link_click', { link_url: ochoLink.href, locale: 'en' });
      });
    });
  </script>
  <script src="/analytics.js" defer></script>
</body>
</html>
