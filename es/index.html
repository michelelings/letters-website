<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!-- OG/Twitter image URL must be absolute and reachable (same host as production avoids crawler issues). -->
  <link rel="canonical" href="https://www.letters.game/es/">
  <link rel="alternate" hreflang="en" href="https://www.letters.game/">
  <link rel="alternate" hreflang="es" href="https://www.letters.game/es/">
  <link rel="alternate" hreflang="x-default" href="https://www.letters.game/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.letters.game/es/">
  <meta property="og:locale" content="es_ES">
  <meta property="og:locale:alternate" content="en_US">
  <meta property="og:title" content="Descarga Letters en el App Store">
  <meta property="og:description" content="Juega a Letters: el juego de palabras de Ocho. Disponible en el App Store.">
  <meta property="og:image" content="https://www.letters.game/og-image.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="900">
  <meta property="og:image:alt" content="Descarga Letters en el App Store">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Descarga Letters en el App Store">
  <meta name="twitter:description" content="Juega a Letters: el juego de palabras de Ocho. Disponible en el App Store.">
  <meta name="twitter:image" content="https://www.letters.game/og-image.png">
  <title>Descarga Letters en el App Store</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CYNDT2QSQX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ letters_locale: 'es' });
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-CYNDT2QSQX');
  </script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="main">
    <div class="main__stage">
      <div class="word" id="word" aria-live="polite"></div>
    </div>
    <p class="beta-cta">
      <a class="beta-cta__btn" href="https://testflight.apple.com/join/3jNtcz3K" target="_blank" rel="noopener noreferrer">Descargar Letters</a>
    </p>
  </main>
  <footer class="site-footer">
    <nav class="site-footer__extras" aria-label="Sitio">
      <a href="/es/guides/mejores-formas-aprender-vocabulario/">Aprender vocabulario</a>
      <span class="lang-switch__sep" aria-hidden="true">·</span>
      <a href="/es/guides/">Todas las guías</a>
    </nav>
    <nav class="lang-switch" aria-label="Elegir idioma">
      <a href="/" hreflang="en">English</a>
      <span class="lang-switch__sep" aria-hidden="true">·</span>
      <a href="/es/" hreflang="es" aria-current="true">Español</a>
    </nav>
    <p>Letters es de <a href="https://www.ocho.so" target="_blank" rel="noopener noreferrer">Ocho</a></p>
  </footer>
  <script src="/words.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      function analyticsEvent(name, params) {
        if (typeof gtag === 'function') {
          gtag('event', name, params);
        }
      }

      const ochoLink = document.querySelector('.site-footer p a');
      ochoLink?.addEventListener('click', () => {
        analyticsEvent('ocho_link_click', { link_url: ochoLink.href, locale: 'es' });
      });
    });
  </script>
  <script src="/analytics.js" defer></script>
</body>
</html>
