<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="ogTitle">
  <title id="ogTitle">Download Letters on the App Store</title>
  <defs>
    <filter id="tile-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#efefef"/>
  <text x="600" y="178" text-anchor="middle" font-family="ui-rounded, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="800" letter-spacing="-0.02em" fill="#1c1c1e">Download</text>
  <g transform="translate(600, 314)">
    <g font-family="ui-rounded, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="58" font-weight="900" letter-spacing="-0.03em" fill="#1c1c1e" text-anchor="middle">
      <!-- Tile tilt matches words.js stableRotationDeg(index) -->
      <g transform="translate(-209.76, -59) rotate(-1.363636 38 59)" filter="url(#tile-shadow)">
        <rect width="76" height="118" rx="19" fill="#f5f5f7" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
        <text x="38" y="80">L</text>
      </g>
      <g transform="translate(-139.84, -59) rotate(2.454545 38 59)" filter="url(#tile-shadow)">
        <rect width="76" height="118" rx="19" fill="#f5f5f7" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
        <text x="38" y="80">E</text>
      </g>
      <g transform="translate(-69.92, -59) rotate(0.272727 38 59)" filter="url(#tile-shadow)">
        <rect width="76" height="118" rx="19" fill="#f5f5f7" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
        <text x="38" y="80">T</text>
      </g>
      <g transform="translate(0, -59) rotate(-1.909091 38 59)" filter="url(#tile-shadow)">
        <rect width="76" height="118" rx="19" fill="#f5f5f7" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
        <text x="38" y="80">T</text>
      </g>
      <g transform="translate(69.92, -59) rotate(1.909091 38 59)" filter="url(#tile-shadow)">
        <rect width="76" height="118" rx="19" fill="#f5f5f7" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
        <text x="38" y="80">E</text>
      </g>
      <g transform="translate(139.84, -59) rotate(-0.272727 38 59)" filter="url(#tile-shadow)">
        <rect width="76" height="118" rx="19" fill="#f5f5f7" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
        <text x="38" y="80">R</text>
      </g>
      <g transform="translate(209.76, -59) rotate(-2.454545 38 59)" filter="url(#tile-shadow)">
        <rect width="76" height="118" rx="19" fill="#f5f5f7" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
        <text x="38" y="80">S</text>
      </g>
    </g>
  </g>
  <text x="600" y="458" text-anchor="middle" font-family="ui-rounded, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="46" font-weight="600" letter-spacing="-0.015em" fill="#3a3a3c">on the App Store</text>
